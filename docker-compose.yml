version: '3.8'

services:
  database:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
    volumes:
      - postgres_data:/var/lib/postgresql/data

  directus:
    image: directus/directus:latest
    ports:
      - "8055:8055"
    depends_on:
      - database
    environment:
      KEY: passkey
      SECRET: mypasskey

      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: directus

      ADMIN_EMAIL: miss.vaidi24@gmail.com
      ADMIN_PASSWORD: admin123

volumes:
  postgres_data: